name: Initialize Database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  init-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: DEVENDRA-5470/banking-app-2-tier
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::720800607391:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Upload init files to S3
        run: |
          aws s3 mb s3://720800607391-devops-scripts --region us-east-1 2>/dev/null || true
          aws s3 cp init.py s3://720800607391-devops-scripts/init.py
          aws s3 cp init.sql s3://720800607391-devops-scripts/init.sql

      - name: Initialize Database on EC2
        id: init
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "cd /tmp",
                "aws s3 cp s3://720800607391-devops-scripts/init.py .",
                "aws s3 cp s3://720800607391-devops-scripts/init.sql .",
                "pip3 install boto3 pymysql -q",
                "python3 init.py"
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Wait and Show Result
        run: |
          sleep 20

          aws ssm list-command-invocations \
            --command-id "${{ steps.init.outputs.cmd_id }}" \
            --details \
            --region us-east-1

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.init.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region us-east-1)

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Database initialization failed."
            exit 1
          fi

          echo "✅ Database initialized successfully."