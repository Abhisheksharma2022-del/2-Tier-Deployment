name: Main Pipeline for Orchestrate

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  verify_connection:
    name: Verify AWS Connection
    uses: ./.github/workflows/test_connection.yml

    permissions:
      id-token: write
      contents: read

  smoke_testing:
    name: Smoke Testing

    needs: verify_connection

    uses: ./.github/workflows/smoke_test.yml

    permissions:
      id-token: write
      contents: read

  deploying:
    name: Deploy Application

    needs: smoke_testing

    uses: ./.github/workflows/deploy.yml

    permissions:
      id-token: write
      contents: read