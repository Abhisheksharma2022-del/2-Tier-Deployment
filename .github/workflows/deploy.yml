name: Deploy SimpleBank 

on: 
 workflow_call: 

permissions: 
  id-token: write 
  contents: read

env:
  VERSION: v1
  REGION: us-east-2
  ECR: 489741402840.dkr.ecr.us-east-2.amazonaws.com
  IMAGE: 489741402840.dkr.ecr.us-east-2.amazonaws.com/2-tier-deployment
  S3_BUCKET: s3://489741402840-devops-scripts 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Abhisheksharma2022-del/2-Tier-Deployment
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::489741402840:role/GitHub-OIDC-Role
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin ${{ env.ECR }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Upload docker-compose to S3
        run: |
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}

      - name: Deploy via SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }} by ${{ github.actor }}" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region ${{ env.REGION }} | docker login --username AWS --password-stdin ${{ env.ECR }}",
              "mkdir -p /home/ubuntu/app",
              "aws s3 cp ${{ env.S3_BUCKET }}/docker-compose.yml /home/ubuntu/app/docker-compose.yml",
              "docker pull ${{ env.IMAGE }}:${{ env.VERSION }}",
              "docker stop simplebank 2>/dev/null в†Їв†µв†Юв†Їв†µв†Юв†Яв†Яв†Їв†Юв†Юв†µв†Яв†µв†µв†µв†Їв†µв†Їв†Їв†Їв†Юв†µв†µв†Юв†µв†Юв†Яв†Їв†Їв†µв†Юв†Юв†Юв†Їв†Юв†Їв†Їв†Юв†Яв†µв†Юв†Яв†Яв†Яв†Юв†µв†µв†Їв†Юв†Їв†Юв†µв†Їв†Їв†Ї true",
              "cd /home/ubuntu/app && IMAGE_TAG=${{ env.VERSION }} docker compose up -d",
              "docker ps --filter name=simplebank --format {{.Status}} | grep -q Up && echo CONTAINER_RUNNING в†µв†µв†Їв†Юв†Яв†Їв†Яв†Їв†Їв†Юв†µв†Яв†Їв†Юв†Яв†Яв†µв†Юв†Їв†Їв†Яв†µв†Яв†µв†Яв†Юв†Їв†Юв†Юв†Яв†µв†Їв†Яв†µв†Юв†µв†Юв†Юв†Юв†Яв†µв†µв†Їв†µв†µв†Яв†Яв†Юв†Їв†Їв†µв†Їв†µв†Їв†Яв†Юв†µв†Яв†Яв†Яв†Яв†Юв†Юв†Яв†Яв†Юв†Юв†Юв†Їв†Їв†Юв†Юв†µв†µв†Їв†Їв†Яв†Їв†Юв†Яв†µв†Їв†Юв†Юв†Яв†µв†Юв†Юв†Юв†Яв†Яв†Їв†Їв†Їв†µв†µв†Яв†Яв†µв†Їв†µв†µв†Юв†Яв†Яв†Яв†Яв†Юв†Їв†Яв†Яв†µв†Яв†Яв†Юв†µв†Яв†Юв†Їв†Юв†Їв†Юв†Яв†µв†µв†µв†Їв†Юв†Їв†Їв†Юв†Юв†µв†Їв†Їв†Юв†Юв†Їв†µв†Юв†Юв†µв†Юв†Їв†Їв†µв†Їв†µв†µв†Їв†Юв†Яв†Яв†Їв†µв†Яв†Юв†Яв†Юв†Яв†Їв†Юв†Яв†µв†Яв†Юв†µв†Яв†µв†µв†Їв†Їв†µв†Юв†Юв†Яв†Їв†Юв†Яв†Юв†Яв†Яв†Яв†Юв†µв†µв†µв†Їв†Юв†µв†µв†Юв†Їв†µв†Їв†Яв†µв†Яв†Юв†µв†µв†Яв†µв†µв†Юв†Юв†Яв†Яв†Юв†Їв†Їв†Яв†µв†Їв†µв†Юв†Їв†µв†Юв†Яв†µв†Юв†Їв†Яв†Яв†µв†Юв†Їв†Їв†µв†Юв†µв†Яв†Юв†µв†µв†µв†Юв†Юв†Юв†Яв†Юв†Юв†Їв†µв†Яв†Їв†µв†Їв†µв†µв†Юв†µв†µв†Яв†Їв†Яв†µв†Юв†Яв†µв†µв†Їв†µв†µв†Яв†µв†µв†Яв†Яв†Яв†µв†Їв†Їв†Юв†Яв†Їв†Їв†Юв†Їв†Яв†Яв†Яв†Їв†Їв†Яв†Яв†µв†Яв†Юв†Яв†Яв†Яв†Їв†Юв†Їв†Яв†Їв†µв†µв†Яв†Яв†Їв†µв†Їв†µв†Їв†µв†µв†Яв†µв†Юв†Юв†Їв†µв†Їв†µв†µв†µв†Яв†µв†µв†µв†Їв†µв†Їв†Їв†µв†Яв†Яв†µв†Їв†Юв†Яв†Яв†Яв†Юв†Юв†Їв†Юв†Яв†Яв†µв†Яв†Юв†Їв†Юв†Яв†Їв†µв†Їв†µв†µв†Яв†Юв†Їв†Юв†Юв†Яв†Юв†Юв†Юв†Їв†µв†Яв†Юв†Їв†Їв†Їв†Яв†Яв†Юв†µв†Їв†µв†Юв†µв†µв†Юв†Юв†Яв†µв†µв†Їв†Їв†Їв†Яв†Юв†Їв†Яв†Яв†Їв†Їв†Їв†Їв†Юв†Яв†Юв†Юв†µв†Яв†Юв†µв†µв†Їв†Яв†Їв†µв†Їв†Їв†Їв†µв†Яв†Юв†Юв†Яв†Юв†Юв†Яв†Їв†Яв†Яв†Їв†µв†Їв†Яв†Яв†Юв†Юв†Яв†Їв†Юв†µв†Їв†Юв†Яв†Їв†µв†µв†Їв†Яв†Яв†µв†Юв†µв†Юв†Їв†Їв†Юв†Юв†Їв†Юв†Їв†µв†Їв†µв†Юв†Юв†Юв†Юв†µв†µв†Яв†Яв†µв†Яв†µв†Яв†Їв†Яв†Їв†Яв†µв†Яв†Яв†Їв†µв†Яв†Їв†Яв†Яв†µв†µв†Їв†Юв†µв†Юв†µв†Їв†Юв†Яв†Юв†Їв†Юв†Їв†Яв†µв†µв†Їв†Їв†Юв†µв†Їв†Яв†Яв†Яв†Яв†µв†µв†µв†Юв†µв†Яв†Яв†Їв†Юв†Юв†µв†Яв†Юв†Юв†µв†µв†µв†µв†Юв†Їв†Юв†Яв†Яв†µв†Юв†µв†Юв†µв†Юв†µв†Юв†µв†Їв†Юв†Їв†Їв†µв†Їв†µв†Їв†Їв†Юв†Юв†µв†Яв†µв†Їв†Юв†Яв†Яв†µв†Їв†Юв†Яв†Їв†Юв†µв†Юв†Юв†µв†Їв†Їв†Юв†Яв†µв†Юв†Їв†Юв†Їв†Їв†Яв†Яв†Їв†µв†Їв†µв†µв†Яв†Юв†Яв†Яв†Їв†Юв†Юв†Їв†Юв†Яв†µв†Їв†Їв†µв†Юв†Їв†Їв†µв†Яв†Юв†µв†Юв†Яв†Їв†Їв†Яв†Юв†Яв†Яв†Юв†Їв†Яв†Їв†Їв†Юв†Яв†µв†Їв†Яв†Юв†Їв†Юв†Юв†Їв†Їв†Їв†Юв†Їв†Юв†Яв†Яв†Яв†Яв†µв†µв†Юв†µв†Яв†Їв†µв†µв†Яв†Юв†Юв†Яв†Юв†Юв†Їв†µв†Яв†µ break
          done

          echo "============ DEPLOY RESULTS ============"

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --details \
            --region ${{ env.REGION }} \
            --query "CommandInvocations[*].[InstanceId,Status,CommandPlugins[0].Output]" \
            --output text | while IFS=$'\t' read -r instance status output; do
              echo "Instance : $instance"
              echo "Status   : $status"
              echo "$output" | tail -5
              echo "----------------------------------------"
            done

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region ${{ env.REGION }})

          [ "$FAILED" -gt 0 ] && \
            echo "::error::Deploy failed on $FAILED instance(s)!" && \
            exit 1

          echo "вЬЕ Deploy successful вАФ ${{ env.VERSION }}"