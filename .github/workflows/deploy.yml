name: Application Deploying On AWS

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  VERSION: v1
  IMAGE: 489741402840.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simple-bank
  REGION: us-east-1
  S3_BUCKET: s3://489741402840-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::489741402840:role/github-action-deploy-role
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
          docker login --username AWS --password-stdin \
          489741402840.dkr.ecr.${{ env.REGION }}.amazonaws.com
          echo "Login Successfull to ECR ✅"

      - name: Build and Push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ env.VERSION }} .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          echo "Image Pushed : ${{ env.VERSION }} ✅"

      - name: Upload Docker-Compose to S3
        run: |
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}
          echo "Docker compose Uploaded ✅"