name: Deploy SimpleBank

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  VERSION: v1.0.0
  IMAGE: 720800607391.dkr.ecr.us-east-1.amazonaws.com/flaskapp-simple-bank
  REGION: us-east-1
  S3_BUCKET: s3://720800607391-devops-scripts

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DEVENDRA-5470/banking-app-2-tier
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::720800607391:role/github-action-deploy-role
          aws-region: ${{ env.REGION }}

      # ---------- BUILD + PUSH ----------
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.REGION }} | \
            docker login --username AWS --password-stdin \
            720800607391.dkr.ecr.${{ env.REGION }}.amazonaws.com

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ env.VERSION }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          docker push ${{ env.IMAGE }}:latest
          echo "✅ Image pushed: ${{ env.VERSION }}"

      # ---------- UPLOAD COMPOSE ----------
      - name: Upload docker-compose to S3
        run: |
          aws s3 mb ${{ env.S3_BUCKET }} --region ${{ env.REGION }} 2>/dev/null || true
          aws s3 cp docker-compose.yml ${{ env.S3_BUCKET }}/docker-compose.yml --region ${{ env.REGION }}
          echo "✅ docker-compose.yml uploaded"

      # ---------- DEPLOY ----------
      - name: Deploy via SSM
        id: deploy
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.VERSION }} by ${{ github.actor }}" \
            --parameters '{"commands":[
              "aws ecr get-login-password --region ${{ env.REGION }} | docker login --username AWS --password-stdin 720800607391.dkr.ecr.${{ env.REGION }}.amazonaws.com",
              "mkdir -p /home/ubuntu/app",
              "aws s3 cp ${{ env.S3_BUCKET }}/docker-compose.yml /home/ubuntu/app/docker-compose.yml",
              "docker pull ${{ env.IMAGE }}:${{ env.VERSION }}",
              "docker stop simplebank || true",
              "docker rm simplebank || true",
              "export IMAGE_TAG=${{ env.VERSION }} && cd /home/ubuntu/app && docker compose up -d",
              "sleep 5",
              "docker ps | grep simplebank && echo OK || echo FAILED"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region ${{ env.REGION }})
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      # ---------- VERIFY ----------
      - name: Verify deployment
        run: |
          sleep 40

          aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --details \
            --region ${{ env.REGION }} \
            --output text

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.deploy.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region ${{ env.REGION }})

          [ "$FAILED" -gt 0 ] && \
            echo "::error::Deploy failed on $FAILED instance(s)!" && \
            exit 1

          echo "✅ Deploy successful — ${{ env.VERSION }}"