version: "3.9"

services:
  simplebank:
    image: 489741402840.dkr.ecr.us-east-2.amazonaws.com/2-tier-deployment:${IMAGE_TAG:-latest}
    container_name: simplebank
    ports:
      - "5000:5000"
    environment:
      - "FLASK_ENV=production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s